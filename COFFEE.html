<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RETROMINT0 – Special Characters</title>
    <style>
        body {
            background: #111;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }
        .box {
            padding: 15px;
            border: 1px solid #0f0;
            width: fit-content;
        }
    </style>
</head>
<body>

    <h1>Python Special Characters (JavaScript Version)</h1>

    <div class="box" id="output"></div>

    <script>
        // Composite function: returns the same characters as Python's string.punctuation
        function getPythonPunctuation() {
            return `!"#$%&'()*+,-./:;<=>?@[\\]^_\`{|}~`;
        }

        // Display them on the page
        document.getElementById("output").textContent = getPythonPunctuation();
    </script>

</body>
</html>
